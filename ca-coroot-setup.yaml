apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: coroot-selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: coroot-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: coroot-ca
  secretName: coroot-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: coroot-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: coroot-ca-issuer
spec:
  ca:
    secretName: coroot-ca-secret
