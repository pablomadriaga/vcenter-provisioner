apiVersion: apps/v1
kind: Deployment
metadata:
  name: PLACEHOLDER
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vcenter-provisioner-secrets
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U antigravity; do sleep 2; done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 70
            seccompProfile:
              type: RuntimeDefault
