apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vcenter-provisioner-staging

resources:
  - ../../base

images:
  - name: antigravity/api-gateway
    newTag: staging
  - name: antigravity/auth-service
    newTag: staging
  - name: antigravity/typing-service
    newTag: staging
  - name: antigravity/vm-orchestrator
    newTag: staging
  - name: antigravity/vcenter-operations
    newTag: staging
  - name: antigravity/credential-manager
    newTag: staging
  - name: antigravity/stats-service
    newTag: staging
  - name: antigravity/monitoring-service
    newTag: staging
  - name: antigravity/backup-service
    newTag: staging
  - name: antigravity/provisioner-ui
    newTag: staging

patches:
  # Moderate replicas for staging
  - target:
        kind: Deployment
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
