apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: vcenter-provisioner
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: tanzu-storage
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-dump
  namespace: vcenter-provisioner
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: postgres-dump
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            - name: pgdump
              image: postgres:15-alpine
              env:
                - name: PGPASSWORD
                  value: password123
              command:
                - sh
                - -c
              args:
                - |
                  DUMPFILE="/backups/vcenter_provisioner_$(date +%Y%m%d_%H%M%S).sql.gz"
                  pg_dump -h postgres -U antigravity -d vcenter_provisioner | gzip > "$DUMPFILE"
                  echo "Backup written to $DUMPFILE ($(du -h "$DUMPFILE" | cut -f1))"
                  find /backups -name "vcenter_provisioner_*.sql.gz" -mtime +7 -delete
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "80m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
