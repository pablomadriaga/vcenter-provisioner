apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcenter-provisioner-ingress
  namespace: vcenter-provisioner
  annotations:
    kubernetes.io/ingress.class: "contour"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  tls:
    - hosts:
        - vcenter-provisioner.example.com
      secretName: vcenter-provisioner-tls
  rules:
    - host: vcenter-provisioner.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: provisioner-ui
                port:
                  number: 80
