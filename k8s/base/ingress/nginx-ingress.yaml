apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vcenter-provisioner-ingress
  namespace: vcenter-provisioner
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: provisioner-ui
                port:
                  number: 80
