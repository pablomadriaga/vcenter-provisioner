apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vm-orchestrator-hpa
  namespace: vcenter-provisioner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vm-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
