apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: vcenter-provisioner
data:
  pgbouncer.ini: |
    [databases]
    vcenter_provisioner = host=postgres port=5432 dbname=vcenter_provisioner user=antigravity password=password123

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    user = postgres
    auth_file = /etc/pgbouncer/userlist.txt
    auth_type = scram-sha-256
    pool_mode = transaction
    max_client_conn = 100
    default_pool_size = 25
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
  userlist.txt: |
    "antigravity" "SCRAM-SHA-256$4096:PYTJnkMP8blGKL/1fqvD4Q==$YiwqeSI/GLfQp+uuM37ZoMBPWzOGLxtkdV2++fQpnQY=:9TnbEYGtzxo1OGy1l7DFivAe+AL5G0qxz/2XZiUnPbs="
