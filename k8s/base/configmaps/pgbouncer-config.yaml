apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: vcenter-provisioner
data:
  pgbouncer.ini: |
    [databases]
    vcenter_provisioner = host=postgres port=5432 dbname=vcenter_provisioner user=antigravity password=password123

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    user = postgres
    auth_file = /etc/pgbouncer/userlist.txt
    auth_type = md5
    pool_mode = transaction
    max_client_conn = 100
    default_pool_size = 25
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
  userlist.txt: |
    "antigravity" "md58f68eec3da0f97cbbc79a4e9049a04c5"
    "app_user" "md56c02d859d7f3b83df09c4638af75190e"
