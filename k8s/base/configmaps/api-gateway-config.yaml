apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: vcenter-provisioner
data:
  PORT: "3000"
  PROBE_INTERVAL: "5"
  PROBE_MODE: "full"
  PROBE_TARGETS: "auth-service,typing-service,vm-orchestrator,vcenter-operations,stats-service,backup-service,monitoring-service"
  CORS_ORIGINS: "http://localhost:5173,http://provisioner-ui"
