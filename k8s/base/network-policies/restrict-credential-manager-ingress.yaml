apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-credential-manager-ingress
spec:
  podSelector:
    matchLabels:
      app: credential-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: vm-orchestrator
        - podSelector:
            matchLabels:
              app: vcenter-operations
        - podSelector:
            matchLabels:
              app: monitoring-service
      ports:
        - port: 8090
          protocol: TCP
