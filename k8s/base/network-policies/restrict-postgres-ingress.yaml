apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-postgres-ingress
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: typing-service
        - podSelector:
            matchLabels:
              app: credential-manager
        - podSelector:
            matchLabels:
              app: stats-service
        - podSelector:
            matchLabels:
              app: monitoring-service
      ports:
        - port: 5432
          protocol: TCP
