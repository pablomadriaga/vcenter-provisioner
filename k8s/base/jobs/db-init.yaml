apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: vcenter-provisioner
spec:
  template:
    metadata:
      labels:
        job: db-init
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                if pg_isready -h postgres -U postgres 2>/dev/null; then
                  echo "PostgreSQL is ready."
                  break
                fi
                echo "Attempt $i/30: waiting..."
                sleep 3
              done
              
              echo "Creating database if not exists..."
              psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'vcenter_provisioner'" | grep -q 1 || createdb -h postgres -U postgres vcenter_provisioner
              
              echo "Running monitoring schema scripts..."
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE SCHEMA IF NOT EXISTS monitoring"
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.probes (id SERIAL PRIMARY KEY, probe_source VARCHAR(100) NOT NULL, probe_target VARCHAR(100) NOT NULL, latency_ms INTEGER, status VARCHAR(20) NOT NULL, error_message TEXT, created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.service_status (service_name VARCHAR(100) PRIMARY KEY, status VARCHAR(20) NOT NULL, last_probe_at TIMESTAMP WITH TIME ZONE, last_success_at TIMESTAMP WITH TIME ZONE, last_failure_at TIMESTAMP WITH TIME ZONE, consecutive_failures INTEGER DEFAULT 0, avg_latency_ms INTEGER, updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.connectivity_matrix (id SERIAL PRIMARY KEY, source_service VARCHAR(100) NOT NULL, target_service VARCHAR(100) NOT NULL, is_reachable BOOLEAN NOT NULL, latency_ms INTEGER, sample_size INTEGER DEFAULT 1, recorded_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE INDEX IF NOT EXISTS idx_probes_source ON monitoring.probes(probe_source, created_at)"
              psql -h postgres -U postgres -d vcenter_provisioner -c "CREATE INDEX IF NOT EXISTS idx_connectivity_source ON monitoring.connectivity_matrix(source_service, recorded_at)"
              psql -h postgres -U postgres -d vcenter_provisioner -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA monitoring TO antigravity"
              psql -h postgres -U postgres -d vcenter_provisioner -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA monitoring TO antigravity"
              
              echo "Initialization complete!"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
      restartPolicy: OnFailure
  backoffLimit: 3