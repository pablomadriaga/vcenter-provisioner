apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: vcenter-provisioner
spec:
  template:
    metadata:
      labels:
        app: db-init
        job: db-init
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init
          image: postgres:15-alpine
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                if pg_isready -h postgres -U antigravity 2>/dev/null; then
                  echo "PostgreSQL is ready."
                  break
                fi
                echo "Attempt $i/30: waiting..."
                sleep 3
              done
              
              echo "Creating database if not exists..."
              psql -h postgres -U antigravity -tc "SELECT 1 FROM pg_database WHERE datname = 'vcenter_provisioner'" | grep -q 1 || createdb -h postgres -U antigravity vcenter_provisioner
              
              echo "Running monitoring schema scripts..."
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE SCHEMA IF NOT EXISTS monitoring"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.probes (id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, probe_source VARCHAR(100) NOT NULL, probe_target VARCHAR(100) NOT NULL, latency_ms INTEGER, status VARCHAR(20) NOT NULL, error_message TEXT, created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.service_status (service_name VARCHAR(100) PRIMARY KEY, status VARCHAR(20) NOT NULL, last_probe_at TIMESTAMP WITH TIME ZONE, last_success_at TIMESTAMP WITH TIME ZONE, last_failure_at TIMESTAMP WITH TIME ZONE, consecutive_failures INTEGER DEFAULT 0, avg_latency_ms INTEGER, updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE TABLE IF NOT EXISTS monitoring.connectivity_matrix (id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, source_service VARCHAR(100) NOT NULL, target_service VARCHAR(100) NOT NULL, is_reachable BOOLEAN NOT NULL, latency_ms INTEGER, sample_size INTEGER DEFAULT 1, recorded_at TIMESTAMP WITH TIME ZONE DEFAULT NOW())"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE INDEX IF NOT EXISTS idx_probes_target_created ON monitoring.probes(probe_target, created_at) INCLUDE (status, latency_ms)"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE INDEX IF NOT EXISTS idx_probes_brin_created ON monitoring.probes USING brin (created_at) WITH (pages_per_range = 16)"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "DROP INDEX IF EXISTS monitoring.idx_probes_created"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "DROP INDEX IF EXISTS monitoring.idx_probes_source"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "CREATE INDEX IF NOT EXISTS idx_connectivity_source ON monitoring.connectivity_matrix(source_service, recorded_at)"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA monitoring TO antigravity"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA monitoring TO antigravity"
              
              echo "Creating application roles..."
              psql -h postgres -U antigravity -d vcenter_provisioner -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user WITH LOGIN PASSWORD 'password123'; END IF; END \$\$;"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'migration_user') THEN CREATE ROLE migration_user WITH LOGIN PASSWORD 'password123'; END IF; END \$\$;"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'readonly_user') THEN CREATE ROLE readonly_user WITH LOGIN PASSWORD 'password123'; END IF; END \$\$;"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT CONNECT ON DATABASE vcenter_provisioner TO app_user, migration_user, readonly_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT USAGE ON SCHEMA public TO app_user, migration_user, readonly_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT USAGE ON SCHEMA monitoring TO app_user, migration_user, readonly_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO migration_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT CREATE ON SCHEMA public TO migration_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT SELECT ON ALL TABLES IN SCHEMA public TO readonly_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "GRANT SELECT ON ALL TABLES IN SCHEMA monitoring TO app_user, migration_user, readonly_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO migration_user"
              psql -h postgres -U antigravity -d vcenter_provisioner -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO readonly_user"

              echo "Initialization complete!"
          env:
            - name: PGPASSWORD
              value: "password123"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
      restartPolicy: OnFailure
  backoffLimit: 3