apiVersion: batch/v1
kind: Job
metadata:
  name: vcenter-provisioner-migrations
  namespace: vcenter-provisioner
spec:
  template:
    spec:
      containers:
        - name: migrations
          image: antigravity/auth-service:latest
          command: ["node", "migrations.js"]
          envFrom:
            - secretRef:
                name: vcenter-provisioner-secrets
      restartPolicy: OnFailure
  backoffLimit: 3
