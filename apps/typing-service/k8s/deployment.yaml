apiVersion: apps/v1
kind: Deployment
metadata:
  name: typing-service
  labels:
    app: typing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: typing-service
    metadata:
      labels:
        app: typing-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "typing-service"
        dapr.io/app-port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: python-service
          image: typing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://my-frontend.cluster-domain.com"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
