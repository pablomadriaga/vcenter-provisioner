apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcenter-operations
  namespace: vcenter-provisioner
  labels:
    app: vcenter-operations
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vcenter-operations
  template:
    metadata:
      labels:
        app: vcenter-operations
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vcenter-operations
          image: antigravity/vcenter-operations:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: vcenter-operations-config
            - secretRef:
                name: vcenter-operations-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          startupProbe:
            httpGet:
              path: /health
              port: 8091
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
