apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-manager
  namespace: vcenter-provisioner
  labels:
    app: credential-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credential-manager
  template:
    metadata:
      labels:
        app: credential-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: credential-manager
          image: antigravity/credential-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: credential-manager-config
            - secretRef:
                name: credential-manager-secrets
            - secretRef:
                name: vcenter-provisioner-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          startupProbe:
            httpGet:
              path: /health
              port: 8090
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
